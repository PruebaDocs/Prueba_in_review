name: Update Main Docs

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  update:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref != 'docs'

    runs-on: ubuntu-latest

    concurrency:
      group: docs-writer
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Preparar rama docs-update
      - name: Prepare docs-update branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/docs-update; then
            echo "docs-update existe"
            git checkout -B docs-update origin/docs-update
          else
            echo "docs-update no existe, creando"
            git checkout -b docs-update
          fi

      # 2. Ejecutar script
      - name: Run update-main script
        run: node .github/scripts/update-main.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Commit cambios
      - name: Commit docs changes
        run: |
          git add docs/Historial/Main.md
          git add docs/Historial/Develop.md
          git commit -m "docs: update main history" || echo "No changes to commit"
          git push origin docs-update

      # 4. Merge docs-update → docs (igual que develop)
      - name: Merge into docs branch
        run: |
          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/docs; then
            echo "docs existe"
            git checkout -B docs origin/docs
          else
            echo "docs no existe, creando"
            git checkout -b docs
            git push origin docs
          fi

          git merge docs-update --no-edit || echo "Nothing to merge"
          git push origin docs