name: Move issues to In Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const issueNumbers = Array.from(body.matchAll(/#(\d+)/g), m => parseInt(m[1], 10));

            if (!issueNumbers.length) {
              console.log("ℹ️ No se encontraron issues en la descripción del PR");
              return;
            }

            console.log("🔎 Issues detectados:", issueNumbers);

            for (const number of issueNumbers) {
              // Obtener issue por número
              const { data: issueData } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number
              });

              const issueNodeId = issueData.node_id;

              // Obtener proyectos donde este issue es item
              const itemData = await github.graphql(`
                query($issueId: ID!) {
                  node(id: $issueId) {
                    ... on Issue {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project {
                            ... on ProjectV2 {
                              id
                              fields(first: 20) {
                                nodes {
                                  __typename
                                  ... on ProjectV2SingleSelectField { id name }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, { issueId: issueNodeId });

              for (const item of itemData.node.projectItems.nodes) {
                const project = item.project;
                const statusField = project.fields.nodes.find(
                  f => f.__typename === "ProjectV2SingleSelectField" &&
                       f.name.toLowerCase() === "status"
                );
                if (!statusField) continue;

                // Obtener opción "In Review"
                const optionsData = await github.graphql(`
                  query($fieldId: ID!) {
                    node(id: $fieldId) {
                      ... on ProjectV2SingleSelectField {
                        options { id name }
                      }
                    }
                  }
                `, { fieldId: statusField.id });

                const inReviewOption = optionsData.node.options.find(
                  o => o.name.toLowerCase() === "in review"
                );
                if (!inReviewOption) continue;

                // Actualizar campo Status
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: ID!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: statusField.id,
                  optionId: inReviewOption.id
                });

                console.log(`✔️ Issue #${number} movido a In Review en Project ${project.id}`);
              }
            }
