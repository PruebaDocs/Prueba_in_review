name: Move Issue to In Review on PR to develop

on:
  pull_request:
    types: [opened]
    branches:
      - develop

jobs:
  move_issue:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Extraer número de issue del cuerpo del PR
        id: extract
        run: |
          ISSUE_NUMBER=$(echo "${{ github.event.pull_request.body }}" | grep -oE 'Fixes #[0-9]+' | grep -oE '[0-9]+')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No se encontró un issue en el cuerpo del PR"
            exit 1
          fi
          echo "issue=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Obtener datos del issue y sus items en proyectos
        id: issue_data
        run: |
          QUERY='
          query {
            repository(owner: "'${{ github.repository_owner }}'", name: "'${{ github.event.repository.name }}'") {
              issue(number: '${{ steps.extract.outputs.issue }}') {
                id
                projectItems(first: 20) {
                  nodes {
                    id
                    project {
                      id
                      title
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }'

          RESPONSE=$(gh api graphql -f query="$QUERY")

          echo "$RESPONSE" > response.json

      - name: Detectar item del proyecto, campo Status y opción In review
        id: detect
        run: |
          ITEM_ID=$(jq -r '.data.repository.issue.projectItems.nodes[0].id' response.json)
          PROJECT_ID=$(jq -r '.data.repository.issue.projectItems.nodes[0].project.id' response.json)

          STATUS_FIELD_ID=$(jq -r '.data.repository.issue.projectItems.nodes[0].project.fields.nodes[] | select(.name=="Status") | .id' response.json)
          IN_REVIEW_OPTION_ID=$(jq -r '.data.repository.issue.projectItems.nodes[0].project.fields.nodes[] | select(.name=="Status") | .options[] | select(.name=="In review") | .id' response.json)

          if [ -z "$ITEM_ID" ] || [ -z "$STATUS_FIELD_ID" ] || [ -z "$IN_REVIEW_OPTION_ID" ]; then
            echo "No se pudo detectar item, campo Status u opción In review"
            exit 1
          fi

          echo "item=$ITEM_ID" >> $GITHUB_OUTPUT
          echo "project=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "status_field=$STATUS_FIELD_ID" >> $GITHUB_OUTPUT
          echo "in_review=$IN_REVIEW_OPTION_ID" >> $GITHUB_OUTPUT

      - name: Mover issue a In review
        run: |
          MUTATION='
          mutation {
            updateProjectV2ItemFieldValue(
              input: {
                projectId: "'${{ steps.detect.outputs.project }}'",
                itemId: "'${{ steps.detect.outputs.item }}'",
                fieldId: "'${{ steps.detect.outputs.status_field }}'",
                value: { singleSelectOptionId: "'${{ steps.detect.outputs.in_review }}'" }
              }
            ) {
              projectV2Item {
                id
              }
            }
          }'

          gh api graphql -f query="$MUTATION"
