name: Move issues to In Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;

            // 1️⃣ Obtener Projects de la ORGANIZACIÓN
            const projectsData = await github.graphql(`
              query($owner: String!) {
                organization(login: $owner) {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner });

            // Cambia esto por el nombre EXACTO de tu Project
            const projectName = "PruebaDocs";  // <-- AJUSTA ESTE NOMBRE

            const project = projectsData.organization.projectsV2.nodes
              .find(p => p.title === projectName);

            if (!project) {
              console.log("❌ No se encontró el Project en la organización");
              return;
            }

            console.log("✔️ Project encontrado:", project.title, project.id);

            // 2️⃣ Buscar campo Status
            const statusField = project.fields.nodes.find(
              f => f.__typename === "ProjectV2SingleSelectField" && f.name === "Status"
            );

            if (!statusField) {
              console.log("❌ No se encontró el campo Status");
              return;
            }

            console.log("✔️ Campo Status encontrado:", statusField.id);

            // 3️⃣ Obtener opciones del campo Status
            const fieldOptionsData = await github.graphql(`
              query($fieldId: ID!) {
                node(id: $fieldId) {
                  ... on ProjectV2SingleSelectField {
                    options { id name }
                  }
                }
              }
            `, { fieldId: statusField.id });

            const inReviewOption = fieldOptionsData.node.options.find(
              o => o.name === "In review"
            );

            if (!inReviewOption) {
              console.log("❌ No existe la opción 'In review'");
              console.log("Opciones disponibles:", fieldOptionsData.node.options);
              return;
            }

            console.log("✔️ Opción In review encontrada:", inReviewOption.id);

            // 4️⃣ Obtener issues vinculados al PR
            const prNodeId = context.payload.pull_request.node_id;

            const prData = await github.graphql(`
              query {
                node(id: "${prNodeId}") {
                  ... on PullRequest {
                    closingIssuesReferences(first: 10) {
                      nodes { id }
                    }
                  }
                }
              }
            `);

            const issues = prData.node.closingIssuesReferences.nodes;

            if (issues.length === 0) {
              console.log("ℹ️ No hay issues vinculados al PR");
              return;
            }

            // 5️⃣ Actualizar cada issue en el Project
            for (const issue of issues) {
              const itemData = await github.graphql(`
                query {
                  node(id: "${issue.id}") {
                    ... on Issue {
                      projectItems(first:10) {
                        nodes { id }
                      }
                    }
                  }
                }
              `);

              const itemId = itemData.node.projectItems.nodes[0]?.id;

              if (!itemId) {
                console.log(`⚠️ Issue ${issue.id} no tiene item en el Project`);
                continue;
              }

              console.log(`➡️ Moviendo Issue ${issue.id} a In review`);

              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}",
                    itemId: "${itemId}",
                    fieldId: "${statusField.id}",
                    value: { singleSelectOptionId: "${inReviewOption.id}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);

              console.log(`✔️ Issue ${issue.id} movido a In review`);
            }
