name: Move issues to In Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review with detailed logs
        uses: actions/github-script@v7
        with:
          script: |
            console.log("🟢 Iniciando workflow para mover issues a 'In review'");

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1️⃣ Obtener Projects V2 en el repo
            const projectsData = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, repo });

            if (!projectsData.repository.projectsV2.nodes.length) {
              console.log("❌ No se encontraron Projects V2 en el repositorio");
              return;
            }

            const project = projectsData.repository.projectsV2.nodes[0];
            console.log(`✔️ Project encontrado: ${project.title} (${project.id})`);

            // 2️⃣ Buscar campo Status
            const statusField = project.fields.nodes.find(f => f.__typename === "ProjectV2SingleSelectField" && f.name.toLowerCase() === "status");
            if (!statusField) {
              console.log("❌ No se encontró el campo 'Status' en el Project");
              return;
            }
            console.log(`✔️ Campo 'Status' encontrado: ${statusField.id}`);

            // 3️⃣ Buscar opción "In review"
            const inReviewOption = statusField.options.find(o => o.name.toLowerCase() === "in review");
            if (!inReviewOption) {
              console.log("❌ No existe la opción 'In review' en el campo Status");
              console.log("Opciones disponibles:", statusField.options.map(o => o.name));
              return;
            }
            console.log(`✔️ Opción 'In review' encontrada: ${inReviewOption.id}`);

            // 4️⃣ Obtener issues vinculados al PR
            const prNodeId = context.payload.pull_request.node_id;
            console.log(`ℹ️ PR node_id: ${prNodeId}`);

            const prData = await github.graphql(`
              query {
                node(id: "${prNodeId}") {
                  ... on PullRequest {
                    closingIssuesReferences(first: 10) {
                      nodes { id number }
                    }
                  }
                }
              }
            `);

            const issues = prData.node.closingIssuesReferences.nodes;
            console.log(`🔎 Issues detectados:`, issues.map(i => i.number));

            if (issues.length === 0) {
              console.log("ℹ️ No hay issues vinculados al PR");
              return;
            }

            // 5️⃣ Procesar cada issue
            for (const issue of issues) {
              console.log(`--- Procesando Issue #${issue.number} ---`);

              // Obtener items del Project para el issue
              const itemData = await github.graphql(`
                query {
                  node(id: "${issue.id}") {
                    ... on Issue {
                      projectItems(first: 10) {
                        nodes { id }
                      }
                    }
                  }
                }
              `);

              let itemId = itemData.node.projectItems.nodes[0]?.id;
              if (!itemId) {
                console.log(`⚠️ Issue #${issue.number} NO está en el Project, se intentará agregar`);

                try {
                  const addItem = await github.graphql(`
                    mutation($projectId: ID!, $issueId: ID!) {
                      addProjectV2ItemById(input: { projectId: $projectId, contentId: $issueId }) {
                        item { id }
                      }
                    }
                  `, { projectId: project.id, issueId: issue.id });

                  itemId = addItem.addProjectV2ItemById.item.id;
                  console.log(`➕ Issue #${issue.number} agregado al Project con itemId ${itemId}`);
                } catch (error) {
                  console.log(`❌ Error al agregar Issue #${issue.number} al Project:`, error.message);
                  continue;
                }
              } else {
                console.log(`✔️ Issue #${issue.number} ya está en el Project con itemId ${itemId}`);
              }

              // Actualizar campo Status a In Review
              try {
                await github.graphql(`
                  mutation {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: "${project.id}",
                      itemId: "${itemId}",
                      fieldId: "${statusField.id}",
                      value: { singleSelectOptionId: "${inReviewOption.id}" }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `);
                console.log(`✅ Issue #${issue.number} movido a 'In review'`);
              } catch (error) {
                console.log(`❌ Error al mover Issue #${issue.number}:`, error.message);
              }
            }

            console.log("🟢 Workflow finalizado");
