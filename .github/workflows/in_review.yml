name: Move linked issues to In Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        with:
          script: |
            const prNodeId = context.payload.pull_request.node_id;

            // 1️⃣ Obtener issues vinculados al PR
            const prData = await github.graphql(`
              query($prNodeId: ID!) {
                node(id: $prNodeId) {
                  ... on PullRequest {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        id
                      }
                    }
                  }
                }
              }
            `, { prNodeId });

            const issues = prData.node.closingIssuesReferences.nodes;
            if (!issues.length) {
              console.log("ℹ️ No hay issues vinculados al PR");
              return;
            }

            for (const issue of issues) {
              // 2️⃣ Obtener Projects donde este issue ya es item
              const itemData = await github.graphql(`
                query($issueId: ID!) {
                  node(id: $issueId) {
                    ... on Issue {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project {
                            ... on ProjectV2 {
                              id
                              fields(first: 20) {
                                nodes {
                                  __typename
                                  ... on ProjectV2SingleSelectField { id name }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, { issueId: issue.id });

              for (const item of itemData.node.projectItems.nodes) {
                const project = item.project;
                const statusField = project.fields.nodes.find(
                  f => f.__typename === "ProjectV2SingleSelectField" &&
                       f.name.toLowerCase() === "status"
                );
                if (!statusField) continue;

                // 3️⃣ Obtener opción "In Review"
                const optionsData = await github.graphql(`
                  query($fieldId: ID!) {
                    node(id: $fieldId) {
                      ... on ProjectV2SingleSelectField {
                        options { id name }
                      }
                    }
                  }
                `, { fieldId: statusField.id });

                const inReviewOption = optionsData.node.options.find(
                  o => o.name.toLowerCase() === "in review"
                );
                if (!inReviewOption) continue;

                // 4️⃣ Actualizar campo Status
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: ID!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: statusField.id,
                  optionId: inReviewOption.id
                });

                console.log(`✔️ Issue ${issue.id} movido a In Review en Project ${project.id}`);
              }
            }
