name: Move Issue to In Review on PR to develop

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - develop

jobs:
  move_issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Extraer número de issue del cuerpo del PR
        id: extract
        run: |
          ISSUE_NUMBER=$(echo "${{ github.event.pull_request.body }}" | grep -oE 'Fixes #[0-9]+' | grep -oE '[0-9]+')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No se encontró un issue en el cuerpo del PR"
            exit 1
          fi
          echo "issue=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Buscar Project por nombre del repositorio
        id: project
        run: |
          PROJECT_NAME="${{ github.event.repository.name }}"

          QUERY='
          query {
            organization(login: "'${{ github.repository_owner }}'") {
              projectsV2(first: 50, query: "'$PROJECT_NAME'") {
                nodes {
                  id
                  title
                }
              }
            }
          }'

          RESPONSE=$(gh api graphql -f query="$QUERY")
          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.data.organization.projectsV2.nodes[] | select(.title=="'${{ github.event.repository.name }}'") | .id')

          if [ -z "$PROJECT_ID" ]; then
            echo "No se encontró un Project con el nombre del repositorio"
            exit 1
          fi

          echo "project=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Obtener projectItems del issue
        id: items
        run: |
          QUERY='
          query {
            repository(owner: "'${{ github.repository_owner }}'", name: "'${{ github.event.repository.name }}'") {
              issue(number: '${{ steps.extract.outputs.issue }}') {
                id
                projectItems(first: 20) {
                  nodes {
                    id
                    project {
                      id
                    }
                  }
                }
              }
            }
          }'

          RESPONSE=$(gh api graphql -f query="$QUERY")
          echo "$RESPONSE" > response.json

      - name: Verificar que el issue está en el Project
        id: verify
        run: |
          ITEM_ID=$(jq -r '.data.repository.issue.projectItems.nodes[] | select(.project.id=="'${{ steps.project.outputs.project }}'") | .id' response.json)

          if [ -z "$ITEM_ID" ]; then
            echo "El issue no está en el Project. Abortando."
            exit 1
          fi

          echo "item=$ITEM_ID" >> $GITHUB_OUTPUT

      - name: Detectar campo Status y opción In review
        id: detect
        run: |
          QUERY='
          query {
            node(id: "'${{ steps.project.outputs.project }}'") {
              ... on ProjectV2 {
                fields(first: 50) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }'

          RESPONSE=$(gh api graphql -f query="$QUERY")

          STATUS_FIELD_ID=$(echo "$RESPONSE" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .id')
          IN_REVIEW_OPTION_ID=$(echo "$RESPONSE" | jq -r '.data.node.fields.nodes[] | select(.name=="Status") | .options[] | select(.name=="In review") | .id')

          if [ -z "$STATUS_FIELD_ID" ] || [ -z "$IN_REVIEW_OPTION_ID" ]; then
            echo "No se encontró el campo Status o la opción In review"
            exit 1
          fi

          echo "status_field=$STATUS_FIELD_ID" >> $GITHUB_OUTPUT
          echo "in_review=$IN_REVIEW_OPTION_ID" >> $GITHUB_OUTPUT

      - name: Mover issue a In review
        run: |
          MUTATION='
          mutation {
            updateProjectV2ItemFieldValue(
              input: {
                projectId: "'${{ steps.project.outputs.project }}'",
                itemId: "'${{ steps.verify.outputs.item }}'",
                fieldId: "'${{ steps.detect.outputs.status_field }}'",
                value: { singleSelectOptionId: "'${{ steps.detect.outputs.in_review }}'" }
              }
            ) {
              projectV2Item {
                id
              }
            }
          }'

          gh api graphql -f query="$MUTATION"
